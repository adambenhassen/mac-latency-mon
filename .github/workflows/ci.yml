name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build universal app
        run: ./build.sh
      - name: Verify binary
        run: lipo -archs LatencyMon.app/Contents/MacOS/LatencyMon | grep -q x86_64
