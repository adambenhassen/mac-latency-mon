<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="LatencyMon — macOS menu-bar latency monitor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17191d"/>
      <stop offset="1" stop-color="#0a0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="panel">
      <rect x="0" y="0" width="1280" height="320" rx="24"/>
    </clipPath>
    <!-- caution triangle, drawn as vector, ~19x17 local units -->
    <g id="warn">
      <path d="M9.5 2.2 L17.4 15.4 H1.6 Z" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
      <line x1="9.5" y1="7.2" x2="9.5" y2="11" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="9.5" cy="13.3" r="1" fill="#ffffff"/>
    </g>
  </defs>

  <style>
    .sans { font-family: -apple-system, "SF Pro Display", "Helvetica Neue", "Segoe UI", Roboto, Arial, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .wordmark { font-size: 62px; font-weight: 700; fill: #f5f6f7; letter-spacing: 0.5px; }
    .tagline  { font-size: 19px; font-weight: 400; fill: #8b9096; letter-spacing: 0.8px; }
    .menus    { font-size: 13.5px; font-weight: 400; fill: #9aa0a6; }
    .reading  { font-size: 17px; font-weight: 500; fill: #ffffff; }
    .barmisc  { font-size: 14px; font-weight: 400; fill: #9aa0a6; }
    .caption  { font-size: 13px; font-weight: 400; fill: #7d838a; letter-spacing: 0.3px; }
  </style>

  <!-- panel -->
  <rect x="0.5" y="0.5" width="1279" height="319" rx="24" fill="url(#bg)" stroke="#ffffff" stroke-opacity="0.09"/>

  <g clip-path="url(#panel)">
    <!-- concentric ping rings, right side -->
    <g fill="none" stroke="#ffffff">
      <circle cx="940" cy="110" r="70"  stroke-opacity="0.05"/>
      <circle cx="940" cy="110" r="130" stroke-opacity="0.04"/>
      <circle cx="940" cy="110" r="200" stroke-opacity="0.03"/>
      <circle cx="940" cy="110" r="280" stroke-opacity="0.02"/>
    </g>
    <!-- soft glow behind menu bar -->
    <ellipse cx="930" cy="110" rx="420" ry="160" fill="url(#glow)"/>

    <!-- ping sparkline across the bottom, with a timeout gap marked by a small triangle -->
    <g fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M64 264 L110 258 L156 266 L202 254 L248 262 L294 248 L340 260 L386 252 L432 268 L478 250 L524 258 L570 244 L616 262 L662 252 L708 266"/>
      <path d="M790 260 L836 250 L882 262 L928 246 L974 258 L1020 252 L1066 264 L1112 250 L1158 260 L1216 254"/>
    </g>
    <!-- tiny triangle marking the gap (timeout) -->
    <use href="#warn" transform="translate(740 246) scale(0.75)" opacity="0.45"/>

    <!-- faux macOS menu bar (right segment) -->
    <g>
      <rect x="620" y="88" width="580" height="44" rx="11" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.13"/>

      <!-- faux app menus on the left -->
      <text class="sans menus" x="648" y="115" opacity="0.55">File&#160;&#160;&#160;&#160;Edit&#160;&#160;&#160;&#160;View&#160;&#160;&#160;&#160;Window</text>

      <!-- highlighted app status item: 24ms -->
      <rect x="878" y="95" width="78" height="30" rx="7" fill="#ffffff" fill-opacity="0.12"/>
      <text class="mono reading" x="917" y="116" text-anchor="middle">24ms</text>

      <!-- wifi glyph -->
      <g stroke="#c2c6cb" stroke-width="1.8" fill="none" stroke-linecap="round" transform="translate(986 100)">
        <path d="M0 6.5 A11 11 0 0 1 15 6.5"/>
        <path d="M3.4 10.2 A6.4 6.4 0 0 1 11.6 10.2"/>
        <circle cx="7.5" cy="14" r="1.4" fill="#c2c6cb" stroke="none"/>
      </g>

      <!-- battery glyph -->
      <g transform="translate(1024 103)">
        <rect x="0" y="0" width="24" height="13" rx="3.5" fill="none" stroke="#c2c6cb" stroke-width="1.5"/>
        <rect x="2.5" y="2.5" width="15" height="8" rx="1.8" fill="#c2c6cb"/>
        <rect x="25.5" y="4" width="2.5" height="5" rx="1.2" fill="#c2c6cb"/>
      </g>

      <!-- clock -->
      <text class="sans barmisc" x="1180" y="115" text-anchor="end">Tue 09:41</text>
    </g>

    <!-- timeout state caption below the bar -->
    <g transform="translate(878 156)">
      <use href="#warn" transform="translate(0 0) scale(0.9)"/>
      <text class="sans caption" x="26" y="13">shown when the ping times out</text>
    </g>

    <!-- word mark -->
    <text class="sans wordmark" x="80" y="152">LatencyMon</text>
    <text class="sans tagline" x="82" y="198">macOS menu-bar latency monitor</text>
  </g>
</svg>
